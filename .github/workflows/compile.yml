name: Compile Typst

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.1"

      - name: Compile template
        run: typst compile --root . template/main.typ /tmp/template-main.pdf

      - name: Compile examples
        run: |
          for f in examples/*.typ; do
            echo "Compiling $f..."
            typst compile --root . "$f" "/tmp/$(basename "$f" .typ).pdf"
          done
          echo "All examples compiled successfully."
